<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Loading Profile... | /six</title>

<!-- EXTERNAL ASSETS -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
/* =========================================
   1. CORE VARIABLES & THEME (Matched to Homepage)
   ========================================= */
:root {
  --c-bg: #030105;
  --text-main: #f0f0f5;
  --text-muted: #8f8ba0;
  
  --glass-surface: rgba(12, 6, 22, 0.45);
  --glass-border: rgba(255, 255, 255, 0.08);
  
  /* Dynamic Accents (Overwritten by JS based on user theme) */
  --accent: #7b2cbf;
  --accent-glow: rgba(123, 44, 191, 0.4);
  
  --radius-card: 24px;
  --ease-snappy: cubic-bezier(0.16, 1, 0.3, 1);
  --font-main: 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background-color: var(--c-bg);
  color: var(--text-main);
  font-family: var(--font-main);
  min-height: 100vh;
  overflow-x: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* =========================================
   2. IMMERSIVE BACKGROUND & GRID SYSTEM
   ========================================= */
.bg-layer {
  position: fixed; inset: 0; z-index: -2; overflow: hidden;
}

/* User's Custom Video/Image Background */
.user-bg-media {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover;
  transition: filter 0.8s var(--ease-snappy), opacity 0.8s var(--ease-snappy), transform 0.8s var(--ease-snappy);
  will-change: filter, transform;
}

/* Mode Switches */
.bg-blurred .user-bg-media { filter: blur(40px) brightness(0.5); transform: scale(1.1); opacity: 0.8; }
.bg-clean .user-bg-media { filter: brightness(0.7); transform: scale(1); opacity: 1; }

/* Tech Grid Overlay (Same as homepage) */
body::after {
  content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;
  background-image: 
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 40px 40px;
  mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
  -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
}

.vignette {
  position: fixed; inset: 0; z-index: -1; pointer-events: none;
  background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.8) 100%);
}

/* =========================================
   3. THE GLASS PROFILE CARD
   ========================================= */
.profile-wrapper {
  width: 100%; max-width: 600px;
  padding: 24px; position: relative; z-index: 10;
}

.profile-card {
  background: var(--glass-surface);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-card);
  box-shadow: 0 40px 100px -20px rgba(0,0,0,0.8);
  overflow: hidden;
  position: relative;
  opacity: 0; transform: translateY(30px) scale(0.98);
  animation: entrance 1s var(--ease-snappy) forwards 0.2s;
}

/* Tech Card Edge Glow */
.profile-card::before {
  content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 10;
  border-radius: var(--radius-card);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
}

@keyframes entrance { to { opacity: 1; transform: translateY(0) scale(1); } }

/* =========================================
   4. BANNER & HEADER (ENHANCED VISIBILITY)
   ========================================= */
.card-header { 
  position: relative; width: 100%; 
  height: 260px; /* Taller banner */
  background: #000; 
  border-bottom: 1px solid var(--glass-border);
}

.banner-media {
  width: 100%; height: 100%; object-fit: cover;
  /* Subtler mask: keeps top 75% completely visible, smooth fade at the very bottom */
  mask-image: linear-gradient(to bottom, black 75%, transparent 100%);
  -webkit-mask-image: linear-gradient(to bottom, black 75%, transparent 100%);
  transition: transform 10s ease;
}
.profile-card:hover .banner-media { transform: scale(1.05); }

/* Edit Profile Button */
.edit-btn {
  position: absolute; top: 20px; right: 20px; z-index: 20;
  background: rgba(10, 5, 20, 0.6); border: 1px solid var(--glass-border);
  backdrop-filter: blur(12px);
  color: #fff; padding: 10px 18px; border-radius: 12px;
  font-family: var(--font-mono); font-size: 11px; font-weight: 700; text-transform: uppercase;
  text-decoration: none; display: flex; align-items: center; gap: 8px;
  transition: 0.3s var(--ease-snappy); opacity: 0; transform: translateY(-10px);
}
.edit-btn.visible { opacity: 1; transform: translateY(0); }
.edit-btn:hover { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }

/* Audio Visualizer (Tech Style) */
.audio-visualizer {
  position: absolute; bottom: 20px; right: 20px; z-index: 20;
  display: flex; align-items: flex-end; gap: 4px; height: 30px;
}
.av-bar {
  width: 4px; border-radius: 4px; background: var(--accent);
  box-shadow: 0 0 10px var(--accent-glow); transition: height 0.1s ease, background 0.2s linear;
}

/* =========================================
   5. PROFILE CONTENT (BODY)
   ========================================= */
.card-body {
  padding: 0 32px 32px; margin-top: -65px; position: relative; z-index: 10;
}

/* Avatar - Glowing Tech Ring */
.avatar-wrapper {
  width: 130px; height: 130px;
  border-radius: 24px; /* Squircle tech look */
  padding: 4px;
  background: var(--c-bg);
  border: 1px solid var(--glass-border);
  box-shadow: 0 15px 35px rgba(0,0,0,0.6), 0 0 30px var(--accent-glow);
  margin-bottom: 20px;
  position: relative;
  transition: 0.4s var(--ease-snappy);
}
.profile-card:hover .avatar-wrapper { border-color: var(--accent); transform: translateY(-4px); }
.avatar-img {
  width: 100%; height: 100%; border-radius: 20px;
  object-fit: cover; background: #111; display: block;
}

/* Username Info */
.identity-row { margin-bottom: 16px; }

.username {
  font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; line-height: 1.1; margin-bottom: 8px;
  display: inline-block; word-break: break-word;
}

/* Username FX */
.fx-glow { color: #fff; text-shadow: 0 0 15px var(--accent-glow), 0 0 30px var(--accent); }
.fx-rgb { position: relative; color: #fff; text-shadow: 2px 0 var(--accent), -2px 0 #00ffff; animation: glitch 3s infinite linear alternate-reverse; }
.fx-gradient { background: linear-gradient(135deg, #fff 20%, var(--accent) 50%, #fff 80%); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 5s linear infinite; }

@keyframes glitch { 0%, 100% { transform: skew(0deg); } 20% { transform: skew(-2deg); } 40% { transform: skew(2deg); } }
@keyframes shine { to { background-position: 200% center; } }

/* Role Badges (Database Style) */
.badges-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.role-pill {
  padding: 6px 12px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05);
  border-left: 2px solid var(--accent); border-radius: 8px;
  font-family: var(--font-mono); font-size: 10px; font-weight: 700; text-transform: uppercase;
  color: #ddd; display: flex; align-items: center; gap: 6px; letter-spacing: 1px;
}
.role-pill i { color: var(--accent); font-size: 14px; }

/* Bio */
.bio-text {
  font-size: 15px; line-height: 1.7; color: #ccc; margin: 24px 0;
  white-space: pre-wrap; font-weight: 400;
}

/* Footer Stats (Bento/Terminal Style) */
.card-footer {
  display: flex; gap: 16px; margin-top: 24px; padding-top: 24px;
  border-top: 1px dashed rgba(255,255,255,0.1);
}
.stat-box {
  background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border);
  padding: 12px 16px; border-radius: 14px; flex: 1; min-width: 100px;
}
.stat-label { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; display: block; letter-spacing: 1px; }
.stat-val { font-size: 16px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 6px; }
.stat-val i { color: var(--accent); }

/* --- SKELETON LOADER --- */
.skel { background: rgba(255,255,255,0.05); border-radius: 8px; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }

.loading-view .banner-media { opacity: 0; }
.loading-view .avatar-img { opacity: 0; }
.loading-view .skel-avatar { position: absolute; inset: 0; border-radius: 20px; }
.loading-view .skel-title { width: 60%; height: 36px; margin-bottom: 12px; }
.loading-view .skel-bio { width: 100%; height: 80px; }

/* Mobile Adaptations */
@media (max-width: 500px) {
  .profile-wrapper { padding: 0; max-width: 100%; }
  .profile-card { border-radius: 0; min-height: 100vh; border: none; box-shadow: none; }
  .card-header { height: 220px; }
  .avatar-wrapper { width: 110px; height: 110px; margin-top: -55px; }
}
</style>
</head>
<body class="bg-blurred"> <!-- Change to bg-clean if you don't want blurred background -->

<!-- Background Layer -->
<div class="bg-layer">
  <div id="dynamic-bg-container"></div>
  <div class="vignette"></div>
</div>

<!-- Main UI -->
<div class="profile-wrapper">
  <main class="profile-card loading-view" id="main-card">
    
    <div class="card-header">
      <div id="banner-container" style="width: 100%; height: 100%;"></div>
      
      <a href="#" class="edit-btn" id="btn-edit-profile">
        <i class="ph-bold ph-pencil-simple"></i> Config
      </a>

      <!-- Tech Visualizer -->
      <div class="audio-visualizer hidden" id="audio-visualizer">
        <div class="av-bar left"></div>
        <div class="av-bar middle"></div>
        <div class="av-bar right"></div>
      </div>
    </div>

    <div class="card-body">
      <div class="avatar-wrapper">
        <img src="" id="ui-avatar" class="avatar-img">
        <div class="skel skel-avatar"></div>
      </div>

      <div class="identity-row">
        <h1 id="ui-username" class="username">
          <div class="skel skel-title"></div>
        </h1>
        <div id="ui-badges" class="badges-container">
          <!-- Filled by JS -->
        </div>
      </div>

      <div id="ui-bio" class="bio-text">
        <div class="skel skel-bio"></div>
      </div>

      <div class="card-footer">
        <div class="stat-box">
          <span class="stat-label">Profile Views</span>
          <span class="stat-val"><i class="ph-bold ph-eye"></i> <span id="ui-views">0</span></span>
        </div>
        <div class="stat-box">
          <span class="stat-label">Entry</span>
          <span class="stat-val"><i class="ph-bold ph-calendar-blank"></i> <span id="ui-joined">----</span></span>
        </div>
      </div>
    </div>

  </main>
</div>

<script>
/**
 * ==========================================
 * ADVANCED PROFILE VIEWER ENGINE 
 * ==========================================
 */
const CONFIG = {
  supabaseUrl: "https://tstsijdifhgmpaszqknr.supabase.co", 
  supabaseKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzdHNpamRpZmhnbXBhc3pxa25yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI5NzA1NTIsImV4cCI6MjA3ODU0NjU1Mn0.8AvcLNL-6PIlfw2FUeLcMC9atefZmZAyUQBOquGpVo4",
  defaults: {
    avatar: "https://cdn.discordapp.com/embed/avatars/0.png",
    banner: "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
  }
};

const sb = supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseKey);

class ProfileViewer {
  constructor() {
    this.dom = {
      card: document.getElementById('main-card'),
      bgContainer: document.getElementById('dynamic-bg-container'),
      bannerContainer: document.getElementById('banner-container'),
      avatar: document.getElementById('ui-avatar'),
      username: document.getElementById('ui-username'),
      badges: document.getElementById('ui-badges'),
      bio: document.getElementById('ui-bio'),
      views: document.getElementById('ui-views'),
      joined: document.getElementById('ui-joined'),
      editBtn: document.getElementById('btn-edit-profile')
    };

    this.audioCtx = null;
    this.init();
  }

  async init() {
    let username = window.location.pathname.split('/@')[1];

    if (!username) {
      const { data: { user } } = await sb.auth.getUser();
      if (user) {
        const { data } = await sb.from("profiles").select("username").eq("id", user.id).single();
        if (data) username = data.username;
      }
    }

    if (!username) return this.renderError("USER IDENTITY NOT FOUND");

    const { data: profile, error } = await sb
      .from("profiles")
      .select("*")
      .eq("username", username)
      .maybeSingle();

    if (error || !profile) return this.renderError("ERROR 404: IDENTITY PURGED");

    await this.loadCustomFont(profile);
    this.render(profile);
    this.checkOwnership(profile.id, profile.username);
    this.incrementViews(profile.id);
  }

  render(data) {
    document.title = `${data.username} | /six SAIS`;

    // Apply User Theme Accent
    const accent = data.theme_color || '#7b2cbf';
    document.documentElement.style.setProperty('--accent', accent);
    document.documentElement.style.setProperty('--accent-glow', accent + '66');

    /* ===== BACKGROUND HANDLER ===== */
    if (data.bg_value && data.bg_type === "video") {
      this.loadVideoWithCORSFix(data.bg_value);
    } else if (data.bg_value) {
      this.dom.bgContainer.innerHTML = `<img src="${data.bg_value}" class="user-bg-media">`;
    } else {
      this.dom.bgContainer.innerHTML = `<div style="width:100%;height:100%;background:radial-gradient(circle at center, ${accent}20 0%, transparent 60%)"></div>`;
    }

    /* ===== MEDIA RENDER (BANNER & AVATAR) ===== */
    this.dom.avatar.src = data.avatar || CONFIG.defaults.avatar;

    const bannerUrl = data.banner_url || CONFIG.defaults.banner;
    if (bannerUrl.match(/\.(mp4|webm)$/)) {
      this.dom.bannerContainer.innerHTML = `<video src="${bannerUrl}" autoplay muted loop playsinline class="banner-media"></video>`;
    } else {
      this.dom.bannerContainer.innerHTML = `<img src="${bannerUrl}" class="banner-media">`;
    }

    /* ===== DATA RENDER ===== */
    this.dom.username.textContent = data.username;
    this.dom.username.className = `username fx-${data.username_effect || 'none'}`;

    this.dom.bio.innerHTML = this.escapeHtml(data.bio || "No system biography logged.");
    this.dom.views.innerText = (data.views || 0).toLocaleString();
    
    const joinDate = new Date(data.created_at);
    this.dom.joined.innerText = `${joinDate.getFullYear()}.${String(joinDate.getMonth()+1).padStart(2, '0')}.${String(joinDate.getDate()).padStart(2, '0')}`;

    /* ===== RENDER BADGES (Fallback if role exists) ===== */
    if(data.role) {
      this.dom.badges.innerHTML = `<div class="role-pill"><i class="ph-fill ph-shield-check"></i> ${data.role}</div>`;
    }

    this.dom.card.classList.remove('loading-view');
  }

  /* ===== CORS VIDEO & VISUALIZER FIX ===== */
  async loadVideoWithCORSFix(url) {
    try {
      const response = await fetch(url);
      const blob = await response.blob();
      const objectUrl = URL.createObjectURL(blob);

      this.dom.bgContainer.innerHTML = `
        <video src="${objectUrl}" class="user-bg-media" autoplay loop playsinline muted preload="auto" id="bg-video"></video>
      `;

      const video = document.getElementById("bg-video");

      const startAudio = async () => {
        video.muted = false;
        await video.play().catch(() => {});
        if (!this.audioCtx) this.initVisualizer(video);
        
        document.removeEventListener("click", startAudio);
        document.removeEventListener("touchstart", startAudio);
      };

      document.addEventListener("click", startAudio);
      document.addEventListener("touchstart", startAudio);

    } catch (err) {
      console.error("Video Background Fault:", err);
    }
  }

  initVisualizer(videoEl) {
    const visualizer = document.getElementById("audio-visualizer");
    if (!visualizer) return;

    const bars = [
      visualizer.querySelector(".left"),
      visualizer.querySelector(".middle"),
      visualizer.querySelector(".right")
    ];

    this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = this.audioCtx.createMediaElementSource(videoEl);
    const analyser = this.audioCtx.createAnalyser();

    analyser.fftSize = 64;
    const dataArray = new Uint8Array(analyser.frequencyBinCount);

    source.connect(analyser);
    analyser.connect(this.audioCtx.destination);
    visualizer.classList.remove("hidden");

    const animate = () => {
      requestAnimationFrame(animate);
      analyser.getByteFrequencyData(dataArray);

      // Average out chunks for 3 bars
      for(let i = 0; i < 3; i++) {
        let val = dataArray[i * 4] / 255; 
        let height = 10 + (val * 30);
        bars[i].style.height = `${height}px`;
      }
    };
    animate();
  }

  async checkOwnership(profileId, username) {
    const { data: { session } } = await sb.auth.getSession();
    if (session && session.user.id === profileId) {
      this.dom.editBtn.href = `/@${username}/edit`;
      this.dom.editBtn.classList.add('visible');
    }
  }

  async loadCustomFont(data) {
    if (data.username_font === 'custom' && data.custom_font_url) {
      const font = new FontFace('CustomProfileFont', `url(${data.custom_font_url})`);
      await font.load();
      document.fonts.add(font);
    }
  }

  incrementViews(id) {
    sb.rpc('increment_views', { row_id: id });
  }

  escapeHtml(str) {
    return str.replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;' }[m]));
  }

  renderError(msg) {
    this.dom.card.innerHTML = `<div style="padding:60px 20px;text-align:center;font-family:var(--font-mono);color:var(--accent-glow);letter-spacing:2px;">${msg}</div>`;
  }
}

document.addEventListener('DOMContentLoaded', () => new ProfileViewer());
</script>

</body>
</html>

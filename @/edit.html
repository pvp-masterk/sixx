<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>/six - Edit Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<!-- EXTERNAL LIBRARIES -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/@phosphor-icons/web"></script>

<!-- FONTS -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cinzel:wght@400;700&family=Orbitron:wght@600&family=Playfair+Display:ital,wght@0,600;1,600&family=UnifrakturMaguntia&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
/* =========================================
   1. HIGH-TECH OS VARIABLES & RESET
   ========================================= */
:root {
  --c-bg: #030105;
  --glass-surface: rgba(12, 6, 22, 0.45);
  --glass-border: rgba(255, 255, 255, 0.08);
  --glass-border-hover: rgba(255, 255, 255, 0.15);
  
  --text-main: #f0f0f5;
  --text-muted: #8f8ba0;
  
  /* Dynamic Accent (Set by user/JS) */
  --accent: #7b2cbf;
  --accent-glow: rgba(123, 44, 191, 0.4);
  
  --radius-card: 24px;
  --radius-input: 14px;
  
  --font-main: 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --ease-snappy: cubic-bezier(0.16, 1, 0.3, 1);
}

@font-face { font-family: 'Diecide Remain'; src: url('fonts/DeicideRemain.otf') format('opentype'); font-display: swap; }

* { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }

body {
  background-color: var(--c-bg);
  color: var(--text-main);
  font-family: var(--font-main);
  min-height: 100vh;
  padding: 60px 24px;
  display: flex; justify-content: center;
  overflow-x: hidden;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--c-bg); }
::-webkit-scrollbar-thumb { background: rgba(123, 44, 191, 0.3); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* Tech Grid Background (Lag-Free) */
body::before {
  content: ""; position: fixed; inset: 0; z-index: -2;
  background: radial-gradient(circle at 50% 0%, rgba(123, 44, 191, 0.1) 0%, transparent 70%);
}
body::after {
  content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;
  background-image: 
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 40px 40px;
  mask-image: radial-gradient(circle at center, black 50%, transparent 100%);
  -webkit-mask-image: radial-gradient(circle at center, black 50%, transparent 100%);
}

/* =========================================
   2. LAYOUT & DASHBOARD CARDS
   ========================================= */
.dashboard {
  width: 100%; max-width: 800px;
  display: flex; flex-direction: column; gap: 24px;
  position: relative; z-index: 10;
  opacity: 0; transform: translateY(20px);
  animation: bootUp 0.8s var(--ease-snappy) forwards;
}
@keyframes bootUp { to { opacity: 1; transform: translateY(0); } }

.header-title {
  font-family: var(--font-mono); font-size: 12px; color: var(--accent);
  letter-spacing: 4px; text-transform: uppercase; margin-bottom: 8px;
  display: flex; align-items: center; gap: 8px;
}
.header-title::before { content: ''; width: 8px; height: 8px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent-glow); }

.card {
  background: var(--glass-surface);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-card);
  overflow: hidden; position: relative;
  transition: 0.4s var(--ease-snappy);
}
.card:hover { border-color: var(--glass-border-hover); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5); }

/* Dashboard Grid System */
.bento-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.col-span-2 { grid-column: span 2; }

@media (max-width: 768px) {
  .bento-grid { grid-template-columns: 1fr; }
  .col-span-2 { grid-column: span 1; }
}

/* =========================================
   3. IDENTITY HEADER (BANNER & AVATAR)
   ========================================= */
.banner-zone {
  width: 100%; height: 220px; background: #000; position: relative; cursor: pointer; overflow: hidden;
}
.banner-media { 
  width: 100%; height: 100%; object-fit: cover; 
  opacity: 0.7; transition: transform 0.8s var(--ease-snappy), opacity 0.4s; 
}
.banner-zone:hover .banner-media { transform: scale(1.05); opacity: 0.3; }

.edit-overlay {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.3); opacity: 0; transition: 0.3s;
}
.banner-zone:hover .edit-overlay { opacity: 1; }
.avatar-zone:hover .edit-overlay { opacity: 1; border-radius: 24px; }

.pill-badge {
  padding: 10px 20px; background: rgba(10, 5, 20, 0.7); border: 1px solid var(--glass-border);
  border-radius: 12px; backdrop-filter: blur(12px); color: #fff;
  font-family: var(--font-mono); font-size: 11px; font-weight: 700; text-transform: uppercase;
  display: flex; gap: 8px; align-items: center; transition: 0.3s;
}
.banner-zone:hover .pill-badge { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }

.profile-bar { padding: 0 32px 32px; margin-top: -60px; display: flex; position: relative; pointer-events: none; }

.avatar-zone {
  width: 120px; height: 120px; border-radius: 24px;
  background: var(--c-bg); padding: 4px; pointer-events: auto; cursor: pointer;
  position: relative; border: 1px solid var(--glass-border);
  box-shadow: 0 15px 35px rgba(0,0,0,0.6); transition: 0.4s var(--ease-snappy);
}
.avatar-zone:hover { border-color: var(--accent); transform: translateY(-4px); box-shadow: 0 15px 35px rgba(0,0,0,0.6), 0 0 30px var(--accent-glow); }
.avatar-img { width: 100%; height: 100%; border-radius: 20px; object-fit: cover; background: #111; display: block; }

/* =========================================
   4. FORM CONTROLS (TERMINAL STYLE)
   ========================================= */
.card-content { padding: 24px; display: flex; flex-direction: column; gap: 20px; height: 100%; }

.section-label {
  font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 2px; display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
}
.section-label i { color: var(--accent); font-size: 14px; }

/* Textarea */
textarea {
  width: 100%; min-height: 120px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border);
  border-radius: var(--radius-input); padding: 16px; color: #fff; font-family: var(--font-main);
  font-size: 14px; line-height: 1.6; resize: none; transition: 0.3s var(--ease-snappy);
}
textarea:focus { background: rgba(0,0,0,0.5); border-color: var(--accent); box-shadow: 0 0 0 4px rgba(123, 44, 191, 0.1); }
textarea::placeholder { color: rgba(255,255,255,0.2); }

/* Interactive Triggers (Fonts/Effects) */
.trigger-card {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border);
  border-radius: var(--radius-input); cursor: pointer; transition: 0.3s var(--ease-snappy);
}
.trigger-card:hover { background: rgba(255,255,255,0.03); border-color: var(--accent); transform: translateX(4px); }
.preview-text { font-size: 24px; color: #fff; line-height: 1; margin-bottom: 4px; font-weight: 700; }
.action-text { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

/* Aesthetics Grid */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* Color Picker Module */
.color-trigger {
  display: flex; align-items: center; justify-content: space-between; padding: 16px;
  background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: var(--radius-input);
  cursor: pointer; position: relative; overflow: hidden; transition: 0.3s;
}
.color-trigger:hover { border-color: var(--glass-border-hover); }
.color-dot { width: 32px; height: 32px; border-radius: 10px; background: var(--accent); box-shadow: 0 0 15px var(--accent-glow); border: 1px solid rgba(255,255,255,0.2); }
.color-label h4 { font-family: var(--font-mono); font-size: 11px; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
input[type="color"] { position: absolute; opacity: 0; inset: 0; cursor: pointer; }

/* File Drop Terminal */
.drop-zone {
  position: relative; height: 66px; border: 1px dashed var(--glass-border); border-radius: var(--radius-input);
  display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; transition: 0.3s;
  background: rgba(0,0,0,0.2); overflow: hidden;
}
.drop-zone:hover, .drop-zone.drag-active { border-color: var(--accent); background: rgba(123,44,191,0.08); }
.drop-zone-content { text-align: center; display: flex; align-items: center; gap: 8px; position: relative; z-index: 2; }
.mini-preview { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.3; pointer-events: none; }

/* Tech Switch */
.toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: rgba(0,0,0,0.2); border-radius: var(--radius-input); border: 1px solid var(--glass-border); }
.toggle-text { font-family: var(--font-mono); font-size: 11px; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
.toggle-switch { position: relative; width: 44px; height: 24px; }
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; cursor: pointer; inset: 0; background-color: rgba(255,255,255,0.1); border-radius: 34px; transition: .4s var(--ease-snappy); border: 1px solid transparent; }
.slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: #888; border-radius: 50%; transition: .4s var(--ease-snappy); }
input:checked + .slider { background-color: rgba(123,44,191,0.2); border-color: var(--accent); box-shadow: inset 0 0 10px rgba(123,44,191,0.5); }
input:checked + .slider:before { transform: translateX(20px); background-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }

/* =========================================
   5. ACTION BUTTON
   ========================================= */
.save-btn {
  width: 100%; padding: 20px; margin-top: 10px;
  background: var(--accent); border: 1px solid var(--accent-glow); border-radius: var(--radius-card);
  color: #fff; font-family: var(--font-mono); font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 4px;
  cursor: pointer; position: relative; overflow: hidden; transition: 0.4s var(--ease-snappy);
  box-shadow: 0 10px 30px -10px var(--accent-glow);
}
.save-btn::before {
  content:""; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transform: translateX(-100%); transition: 0.5s;
}
.save-btn:hover { background: #8e3ee6; transform: translateY(-4px); box-shadow: 0 15px 40px -5px rgba(123,44,191,0.6); }
.save-btn:hover::before { transform: translateX(100%); }
.save-btn:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); transform: none; box-shadow: none; }

.loader { width: 24px; height: 24px; border: 2px solid rgba(255,255,255,0.1); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; margin: 0 auto; }
@keyframes spin { to { transform: rotate(360deg); } }

/* =========================================
   6. MODALS & HUD OVERLAYS
   ========================================= */
.modal-overlay {
  position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.3s;
}
.modal-overlay.active { opacity: 1; pointer-events: auto; }

.modal-content {
  width: 90%; max-width: 500px; background: #08030f; border: 1px solid var(--glass-border); border-radius: var(--radius-card);
  display: flex; flex-direction: column; box-shadow: 0 40px 100px rgba(0,0,0,0.9);
  transform: scale(0.95) translateY(20px); transition: 0.4s var(--ease-snappy); max-height: 85vh;
}
.modal-overlay.active .modal-content { transform: scale(1) translateY(0); }

.modal-header { padding: 24px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; }
.modal-title { font-family: var(--font-mono); font-weight: 700; font-size: 13px; color: #fff; letter-spacing: 2px; text-transform: uppercase; }
.modal-close { background: transparent; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; transition: 0.2s; padding: 4px; }
.modal-close:hover { color: #fff; transform: rotate(90deg); }

.modal-body { padding: 24px; overflow-y: auto; }

.selection-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

.option-card {
  background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-radius: 16px; padding: 24px 16px;
  text-align: center; cursor: pointer; transition: 0.3s var(--ease-snappy);
}
.option-card:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.15); transform: translateY(-4px); }
.option-card.active { background: rgba(123, 44, 191, 0.1); border-color: var(--accent); box-shadow: inset 0 0 20px rgba(123,44,191,0.2), 0 10px 20px rgba(0,0,0,0.4); }
.option-preview { font-size: 28px; margin-bottom: 12px; color: #fff; font-weight: 700; }
.option-label { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1.5px; }

/* Upload Custom Font Card */
.import-card { grid-column: span 2; border-style: dashed; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
.import-card:hover { border-color: var(--accent); background: rgba(123,44,191,0.05); }

/* Username Effects CSS (Matched to profile view) */
.effect-glow { text-shadow: 0 0 15px var(--accent-glow), 0 0 30px var(--accent); }
.effect-rgb { animation: glitch 3s infinite linear alternate-reverse; }
.effect-gradient { background: linear-gradient(135deg, #fff 20%, var(--accent) 50%, #fff 80%); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
@keyframes glitch { 0%, 100% { transform: skew(0deg); } 20% { transform: skew(-2deg); } 40% { transform: skew(2deg); } }

/* Toast */
.toast {
  position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(40px);
  background: rgba(10, 5, 20, 0.9); backdrop-filter: blur(12px); border: 1px solid var(--glass-border);
  padding: 16px 32px; border-radius: 100px; display: flex; align-items: center; gap: 12px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.8); opacity: 0; pointer-events: none; transition: 0.5s var(--ease-snappy); z-index: 5000;
}
.toast.active { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast i { font-size: 20px; }
.toast.success { border-color: rgba(74, 222, 128, 0.3); } .toast.success i { color: #4ade80; }
.toast.error { border-color: rgba(239, 68, 68, 0.3); } .toast.error i { color: #ef4444; }

.hidden { display: none !important; }
</style>
</head>
<body>

<main class="dashboard">

  <div class="header-title">Edit Profile</div>

  <!-- HEADER: BANNER & AVATAR -->
  <section class="card col-span-2">
    <div class="banner-zone" id="zone-banner">
      <img id="view-banner-img" class="banner-media" src="" alt="Banner">
      <video id="view-banner-vid" class="banner-media hidden" autoplay muted loop playsinline></video>
      <input type="file" id="file-banner" hidden accept="image/*,video/mp4,video/webm">
      <div class="edit-overlay"><div class="pill-badge"><i class="ph-bold ph-upload-simple"></i> Upload Banner</div></div>
    </div>

    <div class="profile-bar">
      <div class="avatar-zone" id="zone-avatar">
        <img id="view-avatar" class="avatar-img" src="" alt="Avatar">
        <div class="edit-overlay"><i class="ph-fill ph-camera" style="color:#fff; font-size:28px;"></i></div>
        <input type="file" id="file-avatar" hidden accept="image/*">
      </div>
    </div>
  </section>

  <div class="bento-grid">
    
    <!-- BIO SECTION -->
    <section class="card col-span-2">
      <div class="card-content">
        <div class="section-label"><i class="ph-bold ph-terminal-window"></i> Biography</div>
        <textarea id="inp-bio" placeholder="Initialize identity data..."></textarea>
      </div>
    </section>

    <!-- VISUALITY SECTION -->
    <section class="card">
      <div class="card-content">
        <div class="section-label"><i class="ph-bold ph-text-aa"></i> Visuals</div>
        
        <div class="trigger-card" id="btn-font-modal">
          <div>
            <div class="preview-text" id="lbl-font-preview">/six</div>
            <div class="action-text">Typography</div>
          </div>
          <i class="ph-bold ph-caret-right" style="color:var(--text-muted)"></i>
        </div>
        <input type="hidden" id="inp-font" value="Cinzel">

        <div class="trigger-card" id="btn-effect-modal">
          <div>
            <div class="preview-text" id="lbl-effect-preview">/six</div>
            <div class="action-text">Render Effect</div>
          </div>
          <i class="ph-bold ph-caret-right" style="color:var(--text-muted)"></i>
        </div>
        <input type="hidden" id="inp-effect" value="none">
      </div>
    </section>

    <!-- AESTHETICS SECTION -->
    <section class="card">
      <div class="card-content">
        <div class="section-label"><i class="ph-bold ph-palette"></i> Environment Theme</div>
        
        <div class="grid-2">
          <label class="color-trigger">
            <div class="color-label"><h4>Accent</h4></div>
            <div class="color-dot" id="view-swatch"></div>
            <input type="color" id="inp-color" value="#7b2cbf">
          </label>

          <div class="drop-zone" id="zone-bg">
            <div class="drop-zone-content">
              <i class="ph-bold ph-image-square" style="color:var(--text-muted);"></i>
              <span style="font-family:var(--font-mono); font-size:10px; color:var(--text-muted);" id="lbl-bg-filename">SYS_BG</span>
            </div>
            <div class="mini-preview" id="view-bg-mini"></div>
            <input type="file" id="file-bg" hidden accept="image/*,video/mp4,video/webm">
          </div>
        </div>

        <label class="toggle-row" style="margin-top:auto;">
          <div class="toggle-text"><i class="ph-bold ph-shield-check" style="color:var(--accent)"></i> Display Rank</div>
          <div class="toggle-switch">
            <input type="checkbox" id="inp-role">
            <span class="slider"></span>
          </div>
        </label>
      </div>
    </section>

    <!-- ACTION BUTTON -->
    <div class="col-span-2">
      <button id="btn-save" class="save-btn">
        <span class="btn-content">Save Changes</span>
        <div class="loader"></div>
      </button>
    </div>

  </div>

</main>

<!-- TOAST -->
<div id="toast" class="toast">
  <i class="ph-bold" id="toast-icon"></i>
  <span id="toast-msg" style="font-family:var(--font-mono); font-size:12px; font-weight:700;">Msg</span>
</div>

<!-- MODAL: FONTS -->
<div class="modal-overlay" id="modal-font">
  <div class="modal-content">
    <div class="modal-header">
      <span class="modal-title">Typography</span>
      <button class="modal-close" data-close="modal-font"><i class="ph-bold ph-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="selection-grid" id="grid-fonts"></div>
      <div class="option-card import-card" id="btn-import-font" style="margin-top:16px;">
        <i class="ph-bold ph-upload-simple" style="font-size:24px; color:var(--accent)"></i>
        <div class="option-label" style="margin-top:8px;">Import Custom TTF/OTF</div>
        <input type="file" id="file-custom-font" hidden accept=".ttf,.otf,.woff,.woff2">
      </div>
    </div>
  </div>
</div>

<!-- MODAL: EFFECTS -->
<div class="modal-overlay" id="modal-effect">
  <div class="modal-content">
    <div class="modal-header">
      <span class="modal-title">Render Effects</span>
      <button class="modal-close" data-close="modal-effect"><i class="ph-bold ph-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="selection-grid" id="grid-effects"></div>
    </div>
  </div>
</div>

    { id: 'UnifrakturMaguntia', label: 'Gothic', family: "'UnifrakturMaguntia', cursive" },
    { id: 'Playfair Display', label: 'Luxury', family: "'Playfair Display', serif" },
    { id: 'JetBrains Mono', label: 'Terminal', family: "'JetBrains Mono', monospace" },
  ],
  effects: [
    { id: 'none', label: 'Standard' },
    { id: 'glow', label: 'Neon Glow' },
    { id: 'rgb', label: 'RGB Glitch' },
    { id: 'gradient', label: 'Chroma Gradient' }
  ]
};

const sb = supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseKey);

class ProfileEditor {
  constructor() {
    this.userId = null;
    this.profileId = null;
    this.staging = { avatar: null, banner: null, bg: null, customFont: null };
    
    this.dom = {
      bio: document.getElementById('inp-bio'),
      color: document.getElementById('inp-color'),
      role: document.getElementById('inp-role'),
      font: document.getElementById('inp-font'),
      effect: document.getElementById('inp-effect'),
      bannerImg: document.getElementById('view-banner-img'),
      bannerVid: document.getElementById('view-banner-vid'),
      avatar: document.getElementById('view-avatar'),
      swatch: document.getElementById('view-swatch'),
      fontPreview: document.getElementById('lbl-font-preview'),
      effectPreview: document.getElementById('lbl-effect-preview'),
      bgPreview: document.getElementById('view-bg-mini'),
      bgLabel: document.getElementById('lbl-bg-filename'),
      saveBtn: document.getElementById('btn-save'),
      saveText: document.querySelector('.btn-content'),
      loader: document.querySelector('.loader'),
      zones: { banner: document.getElementById('zone-banner'), avatar: document.getElementById('zone-avatar'), bg: document.getElementById('zone-bg') },
      files: { banner: document.getElementById('file-banner'), avatar: document.getElementById('file-avatar'), bg: document.getElementById('file-bg'), font: document.getElementById('file-custom-font') }
    };
    this.init();
  }

  async init() {
    this.setLoading(true, "Authenticating...");
    const { data: { user } } = await sb.auth.getUser();
    if (!user) return this.failInit("Access Denied. Login Required.");
    this.userId = user.id;

    const { data } = await sb.from("profiles").select("*").eq("id", user.id).maybeSingle();
    
    if (data) {
      this.profileId = data.id;
      this.populateUI(data);
    } else {
      this.profileId = user.id;
      this.dom.avatar.src = CONFIG.defaults.avatar;
      this.dom.bannerImg.src = CONFIG.defaults.banner;
      this.updateFont('Cinzel');
    }

    this.setupEventListeners();
    this.setLoading(false);
  }

  failInit(msg) { this.toast(msg, "error"); this.setLoading(false, "ACCESS DENIED"); this.dom.saveBtn.disabled = true; }

  populateUI(data) {
    this.dom.bio.value = data.bio || "";
    this.dom.role.checked = data.show_role_icon !== false;
    
    const themeColor = data.theme_color || '#7b2cbf';
    this.dom.color.value = themeColor;
    this.updateTheme(themeColor);

    this.dom.avatar.src = data.avatar || CONFIG.defaults.avatar;
    if (data.banner_url && data.banner_url.match(/\.(mp4|webm)$/)) {
      this.dom.bannerImg.classList.add('hidden');
      this.dom.bannerVid.classList.remove('hidden');
      this.dom.bannerVid.src = data.banner_url;
    } else {
      this.dom.bannerImg.src = data.banner_url || CONFIG.defaults.banner;
    }

    if (data.bg_value) this.updateBgPreview(data.bg_value, data.bg_type);
    
    this.updateFont(data.username_font || 'Cinzel');
    this.updateEffect(data.username_effect || 'none');
  }

  setupEventListeners() {
    this.dom.color.addEventListener('input', (e) => this.updateTheme(e.target.value));

    const setupDD = (zone, input, type) => {
      zone.addEventListener('click', () => input.click());
      input.addEventListener('change', () => this.handleFileSelect(input.files[0], type));
      zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('drag-active'); });
      zone.addEventListener('dragleave', () => zone.classList.remove('drag-active'));
      zone.addEventListener('drop', (e) => { e.preventDefault(); zone.classList.remove('drag-active'); if (e.dataTransfer.files.length) this.handleFileSelect(e.dataTransfer.files[0], type); });
    };

    setupDD(this.dom.zones.banner, this.dom.files.banner, 'banner');
    setupDD(this.dom.zones.avatar, this.dom.files.avatar, 'avatar');
    setupDD(this.dom.zones.bg, this.dom.files.bg, 'bg');

    document.getElementById('btn-font-modal').onclick = () => this.openModal('modal-font', 'font');
    document.getElementById('btn-effect-modal').onclick = () => this.openModal('modal-effect', 'effect');
    
    document.querySelectorAll('.modal-close, .modal-overlay').forEach(el => {
      el.addEventListener('click', (e) => {
        if (e.target === el || e.target.closest('.modal-close')) document.getElementById(el.getAttribute('data-close') || el.id).classList.remove('active');
      });
    });

    document.getElementById('btn-import-font').onclick = () => this.dom.files.font.click();
    this.dom.files.font.onchange = (e) => this.handleFontImport(e.target.files[0]);
    this.dom.saveBtn.addEventListener('click', () => this.save());
  }

  handleFileSelect(file, type) {
    if (!file) return;
    if (file.size > 15 * 1024 * 1024) return this.toast("Data limit exceeded (Max 15MB)", "error");

    const url = URL.createObjectURL(file);
    this.staging[type] = file;

    if (type === 'avatar') this.dom.avatar.src = url;
    else if (type === 'banner') {
      if (file.type.startsWith('video')) { this.dom.bannerImg.classList.add('hidden'); this.dom.bannerVid.classList.remove('hidden'); this.dom.bannerVid.src = url; } 
      else { this.dom.bannerVid.classList.add('hidden'); this.dom.bannerImg.classList.remove('hidden'); this.dom.bannerImg.src = url; }
    } 
    else if (type === 'bg') {
      this.dom.bgLabel.innerText = "Media Ready";
      this.updateBgPreview(url, file.type.startsWith('video') ? 'video' : 'image');
    }
  }

  handleFontImport(file) {
    if (!file) return;
    if (!file.name.match(/\.(ttf|otf|woff2?)$/i)) return this.toast("Invalid font format", "error");

    const url = URL.createObjectURL(file);
    const fontName = 'CustomFont_' + Date.now();
    const font = new FontFace(fontName, `url(${url})`);

    font.load().then((loadedFace) => {
      document.fonts.add(loadedFace);
      this.staging.customFont = file;
      this.updateFont('custom', fontName);
      document.getElementById('modal-font').classList.remove('active');
      this.toast("Custom typography injected", "success");
    }).catch(() => this.toast("Font inserting failed", "error"));
  }

  updateTheme(hex) {
    document.documentElement.style.setProperty('--accent', hex);
    document.documentElement.style.setProperty('--accent-glow', hex + '66');
    this.dom.swatch.style.background = hex;
  }

  updateBgPreview(url, type) {
    this.dom.bgPreview.innerHTML = type === 'video' ? `<video src="${url}" autoplay muted loop playsinline style="width:100%;height:100%;object-fit:cover"></video>` : `<img src="${url}" style="width:100%;height:100%;object-fit:cover">`;
  }

  updateFont(id, customFamily = null) {
    this.dom.font.value = id;
    let family = 'inherit';
    document.querySelectorAll('#grid-fonts .option-card').forEach(c => c.classList.remove('active'));

    if (id === 'custom' && customFamily) family = customFamily;
    else { const fontObj = CONFIG.fonts.find(f => f.id === id); if (fontObj) family = fontObj.family; }
    
    this.dom.fontPreview.style.fontFamily = family;
    this.renderFontGrid(id);
  }

  updateEffect(id) {
    this.dom.effect.value = id;
    this.dom.effectPreview.className = 'preview-text'; 
    if(id !== 'none') this.dom.effectPreview.classList.add(`effect-${id}`);
    this.renderEffectGrid(id);
  }

  openModal(modalId, type) {
    if (type === 'font') this.renderFontGrid(this.dom.font.value);
    if (type === 'effect') this.renderEffectGrid(this.dom.effect.value);
    document.getElementById(modalId).classList.add('active');
  }

  renderFontGrid(activeId) {
    const grid = document.getElementById('grid-fonts'); grid.innerHTML = '';
    CONFIG.fonts.forEach(f => {
      const card = document.createElement('div'); card.className = `option-card ${f.id === activeId ? 'active' : ''}`;
      card.innerHTML = `<div class="option-preview" style="font-family:${f.family}">Aa</div><div class="option-label">${f.label}</div>`;
      card.onclick = () => this.updateFont(f.id); grid.appendChild(card);
    });
  }

  renderEffectGrid(activeId) {
    const grid = document.getElementById('grid-effects'); grid.innerHTML = '';
    CONFIG.effects.forEach(e => {
      const card = document.createElement('div'); card.className = `option-card ${e.id === activeId ? 'active' : ''}`;
      card.innerHTML = `<div class="option-preview ${e.id !== 'none' ? `effect-${e.id}` : ''}" style="font-family:var(--font-main);">/six</div><div class="option-label">${e.label}</div>`;
      card.onclick = () => this.updateEffect(e.id); grid.appendChild(card);
    });
  }

  async save() {
    this.setLoading(true, "Loading...");
    try {
      const updates = {
        updated_at: new Date(), bio: this.dom.bio.value, theme_color: this.dom.color.value,
        username_font: this.dom.font.value, username_effect: this.dom.effect.value, show_role_icon: this.dom.role.checked
      };

      if (this.staging.avatar) updates.avatar = await this.upload(this.staging.avatar, 'avatars');
      if (this.staging.banner) updates.banner_url = await this.upload(this.staging.banner, 'banners');
      if (this.staging.bg) { updates.bg_value = await this.upload(this.staging.bg, 'backgrounds'); updates.bg_type = this.staging.bg.type.startsWith('video') ? 'video' : 'image'; }
      if (this.staging.customFont) { updates.custom_font_url = await this.upload(this.staging.customFont, 'fonts'); updates.username_font = 'custom'; }

      const { error } = await sb.from("profiles").upsert({ id: this.profileId, ...updates });
      if (error) throw error;

      this.toast("System variables updated", "success");
      this.staging = { avatar: null, banner: null, bg: null, customFont: null };
    } catch (err) { this.toast("failure", "error"); console.error(err); }
    this.setLoading(false, "Execute Configuration");
  }

  async upload(file, bucket) {
    const ext = file.name.split('.').pop();
    const path = `${this.userId}/${Date.now()}.${ext}`;
    const { error } = await sb.storage.from(bucket).upload(path, file, { upsert: true, contentType: file.type });
    if (error) throw error;
    return sb.storage.from(bucket).getPublicUrl(path).data.publicUrl;
  }

  setLoading(isLoading, text) {
    this.dom.saveBtn.disabled = isLoading;
    this.dom.saveText.textContent = isLoading ? "" : (text || "Execute Configuration");
    this.dom.loader.style.display = isLoading ? "block" : "none";
  }

  toast(msg, type) {
    const t = document.getElementById('toast');
    document.getElementById('toast-msg').innerText = msg;
    t.className = `toast active ${type}`;
    document.getElementById('toast-icon').className = type === 'success' ? 'ph-bold ph-check-circle' : 'ph-bold ph-warning-circle';
    setTimeout(() => t.classList.remove('active'), 4000);
  }
}

document.addEventListener('DOMContentLoaded', () => new ProfileEditor());
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>/six - System Initialization</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<!-- EXTERNAL LIBRARIES -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/@phosphor-icons/web"></script>

<!-- FONTS -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cinzel:wght@700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
/* =========================================
   1. HIGH-TECH OS VARIABLES & RESET
   ========================================= */
:root {
  --c-bg: #030105;
  --glass-surface: rgba(12, 6, 22, 0.5);
  --glass-border: rgba(255, 255, 255, 0.08);
  
  --text-main: #f0f0f5;
  --text-muted: #8f8ba0;
  
  --accent: #7b2cbf;
  --accent-glow: rgba(123, 44, 191, 0.5);
  --success: #4ade80;
  --error: #ef4444;
  
  --font-main: 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --font-brand: 'Cinzel', serif;
  
  --ease-snappy: cubic-bezier(0.16, 1, 0.3, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }

body {
  background-color: var(--c-bg); color: var(--text-main); font-family: var(--font-main);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  overflow: hidden; padding: 20px;
}

/* Background Grid (Lag-Free) */
body::before {
  content: ""; position: fixed; inset: 0; z-index: -2;
  background: radial-gradient(circle at center, rgba(123, 44, 191, 0.15) 0%, transparent 60%);
}
body::after {
  content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;
  background-image: 
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 40px 40px;
  mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
  -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
}

/* =========================================
   2. ONBOARDING GLASS CARD
   ========================================= */
.onboarding-wrapper {
  width: 100%; max-width: 480px; position: relative; z-index: 10;
  opacity: 0; transform: scale(0.95); animation: bootCard 1s var(--ease-snappy) forwards 0.2s;
}

@keyframes bootCard { to { opacity: 1; transform: scale(1); } }

.glass-panel {
  background: var(--glass-surface);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--glass-border);
  border-radius: 24px; padding: 40px; position: relative; overflow: hidden;
  box-shadow: 0 40px 100px rgba(0,0,0,0.8), inset 0 0 0 1px rgba(255,255,255,0.02);
}

/* Holographic Scanner Effect */
.scanner-line {
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  box-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent);
  opacity: 0.5; animation: scan 4s linear infinite; pointer-events: none; z-index: 20;
}
@keyframes scan {
  0% { transform: translateY(-10px); }
  50% { transform: translateY(400px); }
  100% { transform: translateY(-10px); }
}

/* =========================================
   3. TYPOGRAPHY & HEADER
   ========================================= */
.brand-title {
  font-family: var(--font-brand); font-size: 36px; font-weight: 700;
  text-align: center; margin-bottom: 5px; letter-spacing: 2px;
  background: linear-gradient(135deg, #fff, #e0aaff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 15px rgba(123,44,191,0.4));
}
.sys-status {
  text-align: center; font-family: var(--font-mono); font-size: 10px; color: var(--accent);
  text-transform: uppercase; letter-spacing: 4px; margin-bottom: 40px; display: flex; align-items: center; justify-content: center; gap: 8px;
}
.sys-status::before { content: ''; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%, 100% { opacity: 0.4; box-shadow: none; } 50% { opacity: 1; box-shadow: 0 0 10px var(--accent); } }

/* Terminal Typing Text */
.terminal-text {
  font-family: var(--font-mono); font-size: 13px; color: var(--text-muted);
  margin-bottom: 24px; line-height: 1.6; min-height: 42px;
}
.cursor { display: inline-block; width: 8px; height: 14px; background: var(--text-main); vertical-align: middle; animation: blink 1s step-end infinite; }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

/* =========================================
   4. INPUT TERMINAL
   ========================================= */
.input-group { position: relative; margin-bottom: 30px; }
.input-wrapper {
  position: relative; display: flex; align-items: center;
  background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border);
  border-radius: 16px; overflow: hidden; transition: 0.3s var(--ease-snappy);
}
.input-prefix { padding: 0 16px; font-family: var(--font-mono); color: var(--accent); font-weight: 700; font-size: 16px; }
.alias-input {
  width: 100%; background: transparent; border: none; padding: 18px 16px 18px 0;
  color: #fff; font-family: var(--font-mono); font-size: 16px; outline: none;
}
.alias-input::placeholder { color: rgba(255,255,255,0.2); }

/* Input Validation States */
.input-wrapper.focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(123,44,191,0.2); }
.input-wrapper.success { border-color: var(--success); box-shadow: 0 0 20px rgba(74,222,128,0.2); }
.input-wrapper.error { border-color: var(--error); box-shadow: 0 0 20px rgba(239,68,68,0.2); }

.status-msg {
  position: absolute; bottom: -22px; left: 16px; font-family: var(--font-mono);
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
}
.status-msg.success { color: var(--success); }
.status-msg.error { color: var(--error); }
.status-msg.checking { color: var(--accent); }

/* =========================================
   5. ACTION BUTTON
   ========================================= */
.init-btn {
  width: 100%; padding: 18px; background: rgba(255,255,255,0.03);
  border: 1px solid var(--glass-border); border-radius: 16px;
  color: var(--text-muted); font-family: var(--font-mono); font-weight: 700; font-size: 13px;
  text-transform: uppercase; letter-spacing: 4px; cursor: not-allowed; position: relative; overflow: hidden;
  transition: 0.4s var(--ease-snappy);
}
.init-btn.active { background: var(--accent); border-color: var(--accent-glow); color: #fff; cursor: pointer; box-shadow: 0 10px 30px -10px var(--accent-glow); }
.init-btn.active:hover { background: #8e3ee6; transform: translateY(-2px); box-shadow: 0 15px 40px -5px rgba(123,44,191,0.6); }

/* Button Scanning Glare */
.init-btn::after {
  content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transform: skewX(-20deg); transition: 0s;
}
.init-btn.active:hover::after { left: 150%; transition: 0.6s ease-in-out; }

/* Loader state */
.btn-loader { display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
@keyframes spin { to { transform: rotate(360deg); } }

/* =========================================
   6. OVERLAYS & UTILS
   ========================================= */
.fullscreen-loader {
  position: fixed; inset: 0; background: var(--c-bg); z-index: 9999;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity 0.6s var(--ease-snappy), visibility 0.6s;
}
.fullscreen-loader.hidden { opacity: 0; visibility: hidden; }

.fs-brand { font-family: var(--font-brand); font-size: 40px; color: #fff; margin-bottom: 20px; filter: drop-shadow(0 0 20px var(--accent)); animation: fsPulse 2s infinite; }
@keyframes fsPulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

.toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-20px); background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); border: 1px solid var(--error); padding: 12px 24px; border-radius: 50px; color: #fff; font-family: var(--font-mono); font-size: 11px; opacity: 0; pointer-events: none; transition: 0.4s; z-index: 1000; box-shadow: 0 10px 30px rgba(239,68,68,0.2); }
.toast.active { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>
<body>

<!-- INITIAL LOADING SCREEN -->
<div id="boot-screen" class="fullscreen-loader">
  <div class="fs-brand">/SIX</div>
  <div style="font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); letter-spacing: 4px;">AUTHENTICATING CONNECTION...</div>
</div>

<!-- ONBOARDING UI -->
<main class="onboarding-wrapper">
  <div class="glass-panel">
    <div class="scanner-line"></div>
    
    <div class="brand-title">/SIX</div>
    <div class="sys-status">Awaiting Registration</div>

    <div class="terminal-text">
      <span id="typewriter"></span><span class="cursor"></span>
    </div>

    <div class="input-group">
      <div class="input-wrapper" id="inp-wrap">
        <span class="input-prefix">@</span>
        <input type="text" id="inp-alias" class="alias-input" placeholder="Enter desired alias" autocomplete="off" spellcheck="false" maxlength="16">
      </div>
      <div id="status-text" class="status-msg"></div>
    </div>

    <button id="btn-submit" class="init-btn">
      <span class="btn-text">Initialize Profile</span>
      <div class="btn-loader"></div>
    </button>
  </div>
</main>

<div id="toast" class="toast">Error Message</div>

<script>
/**
 * ==========================================
 * HIGH-TECH ONBOARDING ENGINE
 * ==========================================
 */
const CONFIG = {
  supabaseUrl: "https://tstsijdifhgmpaszqknr.supabase.co", 
  supabaseKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzdHNpamRpZmhnbXBhc3pxa25yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI5NzA1NTIsImV4cCI6MjA3ODU0NjU1Mn0.8AvcLNL-6PIlfw2FUeLcMC9atefZmZAyUQBOquGpVo4",
  typeText: "Connection secured.\nSystem requires a unique alias to generate your identity matrix. Enter your designation below."
};

const sb = supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseKey);

class OnboardingOS {
  constructor() {
    this.userId = null;
    this.typingTimer = null;
    this.isAvailable = false;
    
    this.dom = {
      bootScreen: document.getElementById('boot-screen'),
      typewriter: document.getElementById('typewriter'),
      inpWrap: document.getElementById('inp-wrap'),
      input: document.getElementById('inp-alias'),
      status: document.getElementById('status-text'),
      btn: document.getElementById('btn-submit'),
      btnText: document.querySelector('.btn-text'),
      btnLoader: document.querySelector('.btn-loader'),
      toast: document.getElementById('toast')
    };

    this.init();
  }

  async init() {
    // 1. Check Authentication
    const { data: { session } } = await sb.auth.getSession();
    
    if (!session) {
      // User is not logged in, redirect to homepage
      window.location.href = '/';
      return;
    }
    
    this.userId = session.user.id;

    // 2. Check if Profile Already Exists
    const { data: profile } = await sb.from('profiles').select('username').eq('id', this.userId).maybeSingle();
    
    if (profile && profile.username) {
      // PROMPT REQUIREMENT: Redirect to /@username
      window.location.href = `/@${profile.username}`;
      return;
    }

    // 3. Begin Onboarding Sequence
    setTimeout(() => {
      this.dom.bootScreen.classList.add('hidden');
      this.startTypewriter();
      this.setupListeners();
    }, 1200);
  }

  startTypewriter() {
    let i = 0;
    const speed = 30; // ms per char
    const type = () => {
      if (i < CONFIG.typeText.length) {
        this.dom.typewriter.innerHTML += CONFIG.typeText.charAt(i) === '\n' ? '<br>' : CONFIG.typeText.charAt(i);
        i++;
        setTimeout(type, speed);
      }
    };
    type();
  }

  setupListeners() {
    // Input styling
    this.dom.input.addEventListener('focus', () => this.dom.inpWrap.classList.add('focus'));
    this.dom.input.addEventListener('blur', () => this.dom.inpWrap.classList.remove('focus'));

    // Real-time Database Validation
    this.dom.input.addEventListener('input', (e) => {
      clearTimeout(this.typingTimer);
      const val = e.target.value.trim().toLowerCase();
      
      // Auto-format: remove spaces and special chars (keep alphanumeric & underscores)
      e.target.value = val.replace(/[^a-z0-9_]/g, '');
      const cleanVal = e.target.value;

      this.resetStatus();

      if (cleanVal.length === 0) return;
      if (cleanVal.length < 3) {
        this.setStatus("error", "Alias too short (Min 3 chars)");
        return;
      }

      this.setStatus("checking", "Querying database...");
      
      // Debounce the database hit
      this.typingTimer = setTimeout(() => this.checkAvailability(cleanVal), 600);
    });

    // Submission
    this.dom.btn.addEventListener('click', () => {
      if (this.isAvailable && this.dom.btn.classList.contains('active')) {
        this.registerAlias(this.dom.input.value);
      }
    });

    // Enter key support
    this.dom.input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && this.isAvailable) this.registerAlias(this.dom.input.value);
    });
  }

  async checkAvailability(username) {
    try {
      const { data, error } = await sb.from('profiles').select('username').eq('username', username).maybeSingle();
      
      if (error) throw error;
      
      if (data) {
        this.setStatus("error", "Alias already claimed");
      } else {
        this.setStatus("success", "Alias available");
      }
    } catch (err) {
      this.setStatus("error", "Database connection error");
    }
  }

  setStatus(state, message) {
    this.dom.inpWrap.className = `input-wrapper focus ${state}`;
    this.dom.status.className = `status-msg ${state}`;
    this.dom.status.innerText = message;

    if (state === "success") {
      this.isAvailable = true;
      this.dom.btn.classList.add('active');
    } else {
      this.isAvailable = false;
      this.dom.btn.classList.remove('active');
    }
  }

  resetStatus() {
    this.dom.inpWrap.className = 'input-wrapper focus';
    this.dom.status.innerText = '';
    this.isAvailable = false;
    this.dom.btn.classList.remove('active');
  }

  async registerAlias(username) {
    this.setLoading(true);
    
    try {
      // Create the profile in the database
      const { error } = await sb.from('profiles').upsert({
        id: this.userId,
        username: username,
        created_at: new Date(),
        updated_at: new Date()
      });

      if (error) throw error;

      // Registration successful! Fake a high-tech loading completion
      this.dom.status.className = `status-msg success`;
      this.dom.status.innerText = "IDENTITY MATRIX ESTABLISHED. REROUTING...";
      
      setTimeout(() => {
        // PROMPT REQUIREMENT: Redirect user to /@username
        window.location.href = `/@${username}`;
      }, 1500);

    } catch (err) {
      this.showToast("Critical Error: Registration Failed.");
      this.setLoading(false);
    }
  }

  setLoading(isLoading) {
    this.dom.input.disabled = isLoading;
    this.dom.btnText.style.display = isLoading ? 'none' : 'block';
    this.dom.btnLoader.style.display = isLoading ? 'block' : 'none';
    if(isLoading) {
      this.dom.btn.classList.remove('active');
      this.dom.btn.style.cursor = 'wait';
    }
  }

  showToast(msg) {
    this.dom.toast.innerText = msg;
    this.dom.toast.classList.add('active');
    setTimeout(() => this.dom.toast.classList.remove('active'), 4000);
  }
}

// Start Engine
document.addEventListener('DOMContentLoaded', () => {
  new OnboardingOS();
});
</script>
</body>
</html>
